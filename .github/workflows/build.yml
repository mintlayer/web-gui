name: Build and Package

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage
        env:
          SESSION_SECRET: 'ci-test-secret-that-is-at-least-32-chars-long'
          WALLET_RPC_URL: 'http://127.0.0.1:19999'

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: app/coverage/
          retention-days: 14

  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to create GitHub Releases

    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./app/package.json').version")
          if [[ "$TAG" != "$PKG" ]]; then
            echo "Tag v${TAG} does not match app/package.json version ${PKG}"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Tags:
      #   main branch  → mintlayer/gui-x:latest
      #   v1.2.3 tag   → mintlayer/gui-x:1.2.3, mintlayer/gui-x:1.2, mintlayer/gui-x:latest
      #   any push     → mintlayer/gui-x:sha-<short-sha>
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: mintlayer/gui-x
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Package deploy files
        run: |
          mkdir mintlayer-gui
          cp deploy/init.sh mintlayer-gui/
          cp deploy/docker-compose.yml mintlayer-gui/
          chmod +x mintlayer-gui/init.sh
          tar czf mintlayer-gui.tar.gz mintlayer-gui/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mintlayer-gui
          path: mintlayer-gui.tar.gz
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mintlayer-gui.tar.gz
          generate_release_notes: true
