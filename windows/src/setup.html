<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mintlayer Setup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 36px;
      width: 100%;
      max-width: 480px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 10px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #f1f5f9;
    }

    h1 span { color: #94a3b8; font-weight: 400; font-size: 0.9rem; display: block; margin-top: 2px; }

    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"],
    select {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.95rem;
      color: #e2e8f0;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    select:focus { border-color: #3b82f6; }

    .dir-row { display: flex; gap: 8px; }
    .dir-row input { flex: 1; }

    .browse-btn {
      background: #2d3748;
      border: 1px solid #4a5568;
      border-radius: 8px;
      color: #cbd5e0;
      font-size: 0.85rem;
      padding: 10px 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .browse-btn:hover { background: #3d4a5c; }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 0;
    }
    .checkbox-row input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #3b82f6; }
    .checkbox-row label { margin: 0; text-transform: none; font-size: 0.9rem; font-weight: 400; color: #e2e8f0; letter-spacing: 0; }

    .error {
      background: #3b1f1f;
      border: 1px solid #7f2828;
      border-radius: 8px;
      color: #fc8181;
      font-size: 0.85rem;
      padding: 10px 14px;
      margin-bottom: 16px;
      display: none;
    }

    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      padding: 13px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s;
    }
    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:disabled { opacity: 0.5; cursor: default; }

    .spinner {
      display: none;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      color: #94a3b8;
      font-size: 0.9rem;
    }
    .spinner.active { display: flex; }
    .spinner::before {
      content: '';
      width: 18px; height: 18px;
      border: 2px solid #3b82f6;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .totp-box {
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 16px;
      margin-top: 12px;
      display: none;
      text-align: center;
    }
    .totp-box.visible { display: block; }
    .totp-box p { font-size: 0.85rem; color: #94a3b8; margin-bottom: 10px; }
    .totp-secret {
      font-family: monospace;
      font-size: 1rem;
      color: #68d391;
      word-break: break-all;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon"></div>
    <h1>Mintlayer GUI-X <span>First-time setup</span></h1>
  </div>

  <div id="error" class="error"></div>

  <form id="setup-form">
    <div class="field">
      <label>Network</label>
      <select id="network" name="network">
        <option value="mainnet">Mainnet</option>
        <option value="testnet">Testnet</option>
      </select>
    </div>

    <div class="field">
      <label>Data directory</label>
      <div class="dir-row">
        <input type="text" id="data-dir" name="dataDir" placeholder="Loading…" />
        <button type="button" class="browse-btn" id="browse-btn">Browse…</button>
      </div>
    </div>

    <div class="field">
      <label>UI password</label>
      <input type="password" id="password" name="password" placeholder="At least 8 characters" autocomplete="new-password" />
    </div>

    <div class="field">
      <label>Confirm password</label>
      <input type="password" id="password-confirm" name="passwordConfirm" placeholder="Re-enter password" autocomplete="new-password" />
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="totp-enabled" name="totpEnabled" />
      <label for="totp-enabled">Enable two-factor authentication (TOTP)</label>
    </div>

    <button type="submit" class="submit-btn" id="submit-btn">Start Mintlayer</button>
    <div class="spinner" id="spinner">Starting services, this may take a moment…</div>
  </form>

  <div class="totp-box" id="totp-box">
    <p>Scan this secret in your authenticator app (Google Authenticator, Aegis, etc.):</p>
    <div class="totp-secret" id="totp-secret"></div>
    <p style="margin-top:10px;font-size:0.78rem;color:#718096;">Save this secret — it won't be shown again.</p>
  </div>
</div>

<script>
  const { invoke } = window.__TAURI__.core;
  const { open: openDialog } = window.__TAURI__.dialog;

  // Populate default data dir
  invoke('get_default_data_dir').then(dir => {
    document.getElementById('data-dir').value = dir;
  });

  // Browse button
  document.getElementById('browse-btn').addEventListener('click', async () => {
    const selected = await openDialog({ directory: true, title: 'Choose data directory' });
    if (selected) document.getElementById('data-dir').value = selected;
  });

  // Form submit
  document.getElementById('setup-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById('error');
    errorEl.style.display = 'none';

    const network = document.getElementById('network').value;
    const dataDir = document.getElementById('data-dir').value.trim();
    const password = document.getElementById('password').value;
    const passwordConfirm = document.getElementById('password-confirm').value;
    const totpEnabled = document.getElementById('totp-enabled').checked;

    if (!dataDir) { showError('Please choose a data directory.'); return; }
    if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
    if (password !== passwordConfirm) { showError('Passwords do not match.'); return; }

    const btn = document.getElementById('submit-btn');
    const spinner = document.getElementById('spinner');
    btn.disabled = true;
    spinner.classList.add('active');

    try {
      const totpSecret = await invoke('save_config', {
        network,
        dataDir,
        uiPassword: password,
        totpEnabled,
      });

      if (totpEnabled && totpSecret) {
        document.getElementById('totp-secret').textContent = totpSecret;
        document.getElementById('totp-box').classList.add('visible');
        document.getElementById('setup-form').style.display = 'none';
        spinner.classList.remove('active');
      }
      // If no TOTP, window closes automatically from Rust side
    } catch (err) {
      showError(String(err));
      btn.disabled = false;
      spinner.classList.remove('active');
    }
  });

  function showError(msg) {
    const el = document.getElementById('error');
    el.textContent = msg;
    el.style.display = 'block';
  }
</script>
</body>
</html>
